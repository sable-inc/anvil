version: 2

project_name: anvil

before:
  hooks:
    - go mod tidy

builds:
  - id: anvil
    main: ./cmd/anvil
    binary: anvil
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sable-inc/anvil/internal/version.Version={{.Version}}
      - -X github.com/sable-inc/anvil/internal/version.Commit={{.ShortCommit}}
      - -X github.com/sable-inc/anvil/internal/version.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

snapshot:
  version_template: "{{ incpatch .Version }}-next"
