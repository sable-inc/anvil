version: 2

project_name: anvil

before:
  hooks:
    - go mod tidy

builds:
  - id: anvil
    main: ./cmd/anvil
    binary: anvil
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sable-inc/anvil/internal/version.Version={{.Version}}
      - -X github.com/sable-inc/anvil/internal/version.Commit={{.ShortCommit}}
      - -X github.com/sable-inc/anvil/internal/version.Date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: anvil
    homepage: "https://github.com/sable-inc/anvil"
    description: "CLI and MCP server for the Sable AI voice agent platform"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/anvil"]
          end
    repository:
      owner: sable-inc
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"

mcp:
  name: io.github.sable-inc/anvil
  title: "Sable Platform + HyperDX Observability"
  description: "Manage Sable AI voice agents, query HyperDX logs and metrics, and deploy — all from your IDE"
  homepage: "https://github.com/sable-inc/anvil"
  auth:
    type: github-oidc
  repository:
    url: "https://github.com/sable-inc/anvil"
    source: github

snapshot:
  version_template: "{{ incpatch .Version }}-next"
